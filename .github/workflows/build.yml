name: build-image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: rpi-image-gen build (${{ matrix.release }}, ${{ matrix.arch }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        release: [bookworm]
        arch:    [arm64]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free up disk space
        # rpi-image-gen scratch space is several GB; the default GHA arm runner has ~14 GB free.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Install rpi-image-gen host dependencies
        # Per rpi-image-gen docs: mmdebstrap, bdebstrap, genimage + assorted Debian tooling.
        # The exact list lives in rpi-image-gen/install_deps.sh; calling it is the supported path.
        run: |
          sudo apt-get update
          sudo bash ./rpi-image-gen/install_deps.sh

      - name: Diag - host environment
        run: |
          set -x
          uname -a
          lsb_release -a || true
          id
          df -h .
          pwd
          ls -la
          echo "--- rpi-image-gen help ---"
          ./rpi-image-gen/rpi-image-gen help || true

      - name: Cache vendored downloads (FFTW source, WiringPi .deb)
        uses: actions/cache@v4
        with:
          path: vendor/downloads
          key: vendor-${{ hashFiles('layer/zbitx-sbitx.yaml') }}

      - name: Build image
        id: build
        continue-on-error: true
        run: |
          set -x
          ./rpi-image-gen/rpi-image-gen build -S "$PWD" -c zbitx-bookworm.yaml 2>&1 | tee build.log
          exit "${PIPESTATUS[0]}"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Dump build log tail to step summary (always)
        # Step-summary content is rendered into the public run-page HTML,
        # which is readable without any API auth — bypasses the 60/hr
        # unauth rate limit on the actions API.
        if: always()
        run: |
          if [ ! -f build.log ]; then
            echo "(no build.log produced)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Build log tail"
            echo
            echo '```'
            tail -n 200 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "Build step failed; see step summary above + uploaded build-log artifact."
          exit 1

      - name: List build artifacts
        run: |
          ls -lhR work/ 2>/dev/null | head -100 || true
          echo "--- *.img* + *.sbom* files ---"
          find work -name '*.img*' -o -name '*.sbom*' -o -name '*.spdx*' -o -name '*.cdx*' 2>/dev/null | xargs -r ls -lh

      - name: Boot-test rootfs in systemd-nspawn
        # Tier-1 boot validation: boot the produced rootfs as a container,
        # confirm systemd reaches multi-user.target within 90s. Catches
        # service-ordering bugs, D-Bus startup issues, lightdm crash-loops,
        # broken user/shell setup, and similar dynamic failures that the
        # chroot tests fundamentally can't see.
        #
        # Limits: nspawn shares the host kernel, so kernel module loading
        # (snd-aloop, dtoverlays) + hardware (I2C, GPIO, WM8731 audio) are
        # not tested. Those still need real-hardware validation.
        id: nspawn
        continue-on-error: true
        run: |
          set -eux
          sudo apt-get install -y --no-install-recommends systemd-container
          ROOTFS=$(ls -d work/chroot-*/filesystem 2>/dev/null | head -1)
          if [ -z "$ROOTFS" ] || [ ! -d "$ROOTFS" ]; then
            echo "FAIL: no work/chroot-*/filesystem rootfs found" >&2
            exit 1
          fi
          echo "Booting $ROOTFS via systemd-nspawn..."

          # Boot in background, mirror PID 1's console to a log file we can grep.
          # --kill-signal=SIGRTMIN+3 is systemd's "poweroff" signal.
          # --resolv-conf=off avoids stomping the chroot's /etc/resolv.conf.
          sudo timeout --kill-after=10 120 systemd-nspawn \
            -D "$ROOTFS" \
            --boot \
            --quiet \
            --machine=zbitx-test \
            --resolv-conf=off \
            --kill-signal=SIGRTMIN+3 \
            2>&1 | tee nspawn.log &
          NSPAWN_BG=$!

          # Poll for the multi-user marker, or fail after 90s.
          # systemd colorizes its console output, so the line we want
          # looks like:
          #   [ OK ] Reached target \x1b[...mmulti-user.target\x1b[...m - Multi-User System.
          # Strip ANSI escape codes before grepping so the literal
          # "Reached target multi-user" matches.
          DEADLINE=$(( $(date +%s) + 90 ))
          REACHED=0
          ansi_strip() { sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' "$1"; }
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if [ -f nspawn.log ] && ansi_strip nspawn.log | grep -qE "Reached target multi-user|Multi-User System"; then
              REACHED=1
              break
            fi
            sleep 2
          done

          # Clean shutdown of the container.
          sudo machinectl poweroff zbitx-test 2>/dev/null || true
          # Give it a few seconds to wind down before we force-kill.
          for i in 1 2 3 4 5; do
            kill -0 "$NSPAWN_BG" 2>/dev/null || break
            sleep 1
          done
          sudo pkill -SIGRTMIN+3 -f "systemd-nspawn.*zbitx-test" 2>/dev/null || true
          wait "$NSPAWN_BG" 2>/dev/null || true

          # Diagnose + emit verdict.
          if [ "$REACHED" -eq 1 ]; then
            echo "OK: rootfs reached multi-user.target in systemd-nspawn"
          else
            echo "FAIL: rootfs did not reach multi-user.target within 90s" >&2
            echo "--- nspawn.log (last 80 lines) ---" >&2
            tail -n 80 nspawn.log >&2 || true
            exit 1
          fi

      - name: Upload nspawn boot log (always)
        if: always() && hashFiles('nspawn.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: nspawn-log
          path: nspawn.log
          if-no-files-found: warn
          retention-days: 14

      - name: Append nspawn log tail to step summary (always)
        if: always() && hashFiles('nspawn.log') != ''
        run: |
          {
            echo
            echo "## systemd-nspawn boot log tail"
            echo
            echo '```'
            tail -n 80 nspawn.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if nspawn boot test failed
        if: steps.nspawn.outcome == 'failure'
        run: |
          echo "systemd-nspawn boot test failed; see step summary + nspawn-log artifact."
          exit 1

      - name: Boot-test image in QEMU (raspi3b)
        # Tier-2 boot validation: boot the actual produced .img in QEMU
        # as a Pi 3 (closest emulated SoC to Pi Zero 2 W's BCM2710A1).
        # Catches things nspawn can't: kernel boot, initramfs, /etc/fstab,
        # systemd as real PID 1, bootloader cmdline handling.
        #
        # Limits: QEMU raspi3b has no USB (no kbd/mouse), no network,
        # no I2C/audio device emulation. We're just looking for the
        # login-prompt marker proving systemd reached multi-user.target
        # via the real boot path.
        id: qemu
        if: steps.nspawn.outcome == 'success'
        continue-on-error: true
        run: |
          # Mirror all output of this step to qemu.log from the start so
          # the artifact upload + step-summary dump capture early failures
          # (apt-install errors, partition-probe issues, etc.). `set -x`
          # makes the trace easier to diagnose; `set -e` propagates errors.
          exec > >(tee -a qemu.log) 2>&1
          set -eux

          sudo apt-get install -y --no-install-recommends \
            qemu-system-arm qemu-utils mtools

          IMG=$(ls work/image-*/zbitx-bookworm.img 2>/dev/null | head -1)
          if [ -z "$IMG" ] || [ ! -f "$IMG" ]; then
            echo "FAIL: no work/image-*/zbitx-bookworm.img found"
            ls -la work/ || true
            ls -la work/image-*/ 2>/dev/null || true
            exit 1
          fi
          echo "Booting $IMG in QEMU raspi3b..."
          ls -la "$IMG"

          # Show partition table so we can debug if extraction fails.
          /sbin/fdisk -lu "$IMG" || true
          echo "--- sfdisk -d ---"
          /sbin/sfdisk -d "$IMG" || true

          # Get the boot partition (FAT32 / type=c) start sector via
          # sfdisk's machine-readable -d output. Line format:
          #   <img>1 : start=     16384, size=     98304, type=c, bootable
          # Fall back to the dos table type code 'c' (W95 FAT32 LBA).
          BOOT_START=$(/sbin/sfdisk -d "$IMG" \
            | awk -F'[ ,=]+' '/type=c[, ]/{for(i=1;i<=NF;i++) if($i=="start") {print $(i+1); exit}}')
          if [ -z "$BOOT_START" ]; then
            echo "FAIL: couldn't find type=c (FAT32) partition in sfdisk -d output"
            exit 1
          fi
          BOOT_OFFSET=$((BOOT_START * 512))
          echo "Boot partition: start sector=$BOOT_START, offset=$BOOT_OFFSET bytes"

          # List boot partition contents so we know what's available.
          echo "--- Boot partition contents ---"
          mdir -i "${IMG}@@${BOOT_OFFSET}" || true

          mkdir -p /tmp/qboot
          mcopy -i "${IMG}@@${BOOT_OFFSET}" ::kernel8.img /tmp/qboot/kernel8.img
          # Pi Zero 2 W uses bcm2710-rpi-zero-2-w.dtb. Try common alternates.
          for dtb in bcm2710-rpi-zero-2-w.dtb bcm2710-rpi-zero-2.dtb bcm2837-rpi-3-b.dtb bcm2710-rpi-3-b.dtb; do
            if mcopy -i "${IMG}@@${BOOT_OFFSET}" "::${dtb}" /tmp/qboot/board.dtb 2>/dev/null; then
              echo "Using DTB: $dtb"
              break
            fi
          done
          if [ ! -f /tmp/qboot/board.dtb ]; then
            echo "FAIL: no usable DTB found in boot partition"
            exit 1
          fi
          # initramfs (optional — Pi OS can boot without)
          mcopy -i "${IMG}@@${BOOT_OFFSET}" ::initramfs8 /tmp/qboot/initramfs 2>/dev/null \
            || mcopy -i "${IMG}@@${BOOT_OFFSET}" ::initrd.img /tmp/qboot/initramfs 2>/dev/null \
            || echo "(no initramfs; booting kernel directly)"

          ls -la /tmp/qboot/

          INITRD_ARG=""
          [ -f /tmp/qboot/initramfs ] && INITRD_ARG="-initrd /tmp/qboot/initramfs"

          # QEMU's raspi3b machine requires the SD card image size to
          # be a power of 2. Our deployed image is 1.36 GiB. Make a
          # copy at 2 GiB and pass that to QEMU; the original image
          # artifact stays intact for users to flash.
          cp --reflink=auto "$IMG" /tmp/qboot/sd.img
          qemu-img resize -f raw /tmp/qboot/sd.img 2G
          QEMU_IMG=/tmp/qboot/sd.img
          ls -la "$QEMU_IMG"

          # Redirect QEMU's serial output to its OWN file so we grep
          # only kernel/systemd output. (qemu.log also captures the
          # script's `set -x` trace, which would otherwise let grep
          # match its own pattern string — yes that happened.)
          : > qemu-serial.log

          # The Pi kernel expects root=/dev/mmcblk0p2 (boot=p1, root=p2).
          # raspi3b in qemu exposes the -drive ...,if=sd as mmcblk0.
          # NOTE: we drop `set -x` for this command and the poll loop
          # so the trace doesn't pollute qemu.log either.
          set +x
          echo "QEMU version:"
          qemu-system-aarch64 --version | head -1

          # Drop `sudo` (not needed — QEMU userspace doesn't need root)
          # and `-cpu cortex-a72` (raspi3b is Cortex-A53; mismatch may
          # have caused the immediate exit). raspi3b sets sensible
          # defaults for cpu + smp.
          echo "Starting QEMU..."
          # `-serial file:` is more reliable than `-serial stdio` when
          # the step's stdin is /dev/null (GHA default) — stdio mode
          # silently disables itself if stdin isn't a tty. We tail the
          # file from the poll loop to detect boot markers.
          timeout --kill-after=20 480 qemu-system-aarch64 \
            -M raspi3b \
            -m 1G \
            -kernel /tmp/qboot/kernel8.img \
            -dtb /tmp/qboot/board.dtb \
            $INITRD_ARG \
            -drive file="$QEMU_IMG",if=sd,format=raw \
            -append "root=/dev/mmcblk0p2 rootfstype=ext4 rw rootwait console=ttyAMA0,115200 panic=20 systemd.show_status=1 systemd.log_level=info systemd.log_target=console systemd.unit=multi-user.target" \
            -serial file:qemu-serial.log \
            -monitor none \
            -display none \
            -no-reboot \
            </dev/null >qemu-stdout.log 2>&1 &
          QPID=$!
          echo "QEMU PID: $QPID"

          # Watch for boot marker in QEMU's OWN output, or QEMU exit,
          # whichever first. raspi3b emulation is slow — give it 7 min.
          DEADLINE=$(( $(date +%s) + 420 ))
          REACHED=0
          ansi_strip() { sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' "$1"; }
          MATCHER='Reached target multi-user\.target|sbitx login:|raspberrypi login:'
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if [ -s qemu-serial.log ] && ansi_strip qemu-serial.log | grep -qE "$MATCHER"; then
              REACHED=1
              break
            fi
            if ! kill -0 "$QPID" 2>/dev/null; then
              QEMU_EC=$(wait "$QPID" 2>/dev/null; echo $?)
              echo "QEMU process exited on its own (exit code ${QEMU_EC:-?})"
              echo "--- qemu-serial.log size: $(stat -c%s qemu-serial.log) bytes ---"
              echo "--- qemu-stdout.log (last 30 lines) ---"
              tail -n 30 qemu-stdout.log || true
              break
            fi
            sleep 5
          done
          set -x

          # Clean shutdown — SIGTERM, then SIGKILL after a beat.
          kill -TERM "$QPID" 2>/dev/null || true
          for i in 1 2 3 4 5; do
            kill -0 "$QPID" 2>/dev/null || break
            sleep 1
          done
          kill -KILL "$QPID" 2>/dev/null || true
          wait "$QPID" 2>/dev/null || true

          if [ "$REACHED" -eq 1 ]; then
            echo "OK: QEMU boot reached multi-user / login prompt"
          else
            echo "FAIL: QEMU did not reach login within 7min" >&2
            echo "--- qemu-serial.log (last 80 lines, ANSI-stripped) ---" >&2
            ansi_strip qemu-serial.log | tail -n 80 >&2 || true
            exit 1
          fi

      - name: Upload QEMU logs (always)
        if: always() && (hashFiles('qemu.log') != '' || hashFiles('qemu-serial.log') != '')
        uses: actions/upload-artifact@v4
        with:
          name: qemu-log
          path: |
            qemu.log
            qemu-serial.log
            qemu-stdout.log
          if-no-files-found: warn
          retention-days: 14

      - name: Append QEMU log tail to step summary (always)
        if: always() && hashFiles('qemu-serial.log') != ''
        run: |
          {
            echo
            echo "## QEMU serial-console tail"
            echo
            echo '```'
            sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' qemu-serial.log | tail -n 100
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if QEMU boot test failed
        if: steps.qemu.outcome == 'failure'
        run: |
          echo "QEMU boot test failed; see step summary + qemu-log artifact."
          exit 1

      - name: Upload image artifact
        # rpi-image-gen writes the deploy bundle to work/deploy-<git-sha>/.
        # The .img.zst is what users flash.
        uses: actions/upload-artifact@v4
        with:
          name: zbitx-${{ matrix.release }}-${{ matrix.arch }}-img
          path: |
            work/deploy-*/zbitx-bookworm.img.zst
            work/deploy-*/*.tar.zst
            work/image-*/zbitx-bookworm.img
          if-no-files-found: warn
          retention-days: 14

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: zbitx-${{ matrix.release }}-${{ matrix.arch }}-sbom
          path: |
            work/deploy-*/*.sbom*
            work/chroot-*/*.sbom*
          if-no-files-found: warn
          retention-days: 90
