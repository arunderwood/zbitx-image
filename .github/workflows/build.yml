name: build-image

on:
  push:
    branches: [main]
    # Tag pushes are releases — they build AND keep the image (see the gated
    # artifact steps). Narrow to a pattern (e.g. ['v*']) if non-release tags
    # are ever used.
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run when a newer commit lands on the same ref (e.g. a PR
# force-push). The full pi-gen build is long; letting superseded runs finish
# just burns runner-hours. main pushes get a distinct group so releases aren't
# cancelled by a follow-up merge.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: pi-gen build (${{ matrix.release }}, ${{ matrix.arch }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        release: [bookworm]
        arch:    [arm64]

    steps:
      - name: Checkout (with submodules)
        # vendor/pi-gen (the build tooling, pinned in .gitmodules to the
        # bookworm-arm64 branch) and vendor/sbitx (the app source) both come in
        # as submodules. fetch-depth: 0 so build.sh's `git describe` works.
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free up disk space
        # pi-gen keeps a full rootfs copy per stage (stage0..4 + stage-zbitx);
        # a Desktop build is tens of GB. The default GHA arm runner has ~14 GB
        # free, so reclaim what we can. If this proves too tight, move WORK_DIR
        # onto a larger mounted volume or use a bigger runner.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Install pi-gen host dependencies
        # Matches pi-gen's `depends` manifest (its dependencies_check is
        # unconditional — it wants qemu-user-static present even on a native
        # arm64 runner, though binfmt itself is then unused). Plus bmap-tools
        # for the optional .bmap and systemd-container for the later nspawn
        # boot test.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            quilt parted coreutils qemu-user-static debootstrap zerofree zip \
            dosfstools e2fsprogs libcap2-bin libarchive-tools grep rsync \
            xz-utils curl xxd file git kmod bc gpg pigz arch-test bmap-tools \
            systemd-container

      - name: Install syft (for SBOM)
        # pi-gen's finalise stage generates an SPDX SBOM if `syft` is on PATH.
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Diag - host environment
        run: |
          set -x
          uname -a
          lsb_release -a || true
          id
          df -h .
          echo "--- pi-gen pin ---"
          git -C vendor/pi-gen describe --tags --always
          git -C vendor/pi-gen rev-parse HEAD

      - name: Build image
        id: build
        continue-on-error: true
        # Release runs (main / tags) compress the image with xz -6 for a small
        # flashable artifact. Throwaway runs (PR / branch / manual dispatch) set
        # DEPLOY_COMPRESSION=none to skip the multi-minute xz pass entirely — the
        # image is never uploaded, and the nspawn boot test reads the
        # uncompressed rootfs, so nothing here depends on a compressed image.
        # github.ref is inlined (not via an env var) so a release can never fall
        # through to 'none'; pi-gen.config provides the xz/-6 defaults.
        env:
          DEPLOY_COMPRESSION: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && 'xz' || 'none' }}
        run: |
          set -x
          ./scripts/pi-gen-build.sh 2>&1 | tee build.log
          exit "${PIPESTATUS[0]}"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Dump build log tail to step summary (always)
        # Step-summary content is rendered into the public run-page HTML,
        # readable without API auth — bypasses the 60/hr unauth API rate limit.
        if: always()
        run: |
          if [ ! -f build.log ]; then
            echo "(no build.log produced)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Build log tail"
            echo
            echo '```'
            tail -n 200 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "Build step failed; see step summary above + uploaded build-log artifact."
          exit 1

      - name: List build artifacts
        run: |
          ls -lhR vendor/pi-gen/deploy/ 2>/dev/null | head -50 || true
          echo "--- rootfs stages ---"
          ls -d vendor/pi-gen/work/*/*/rootfs 2>/dev/null || true

      - name: Boot-test rootfs in systemd-nspawn
        # Tier-1 boot validation: boot the final (stage-zbitx) rootfs as a
        # container, confirm systemd reaches multi-user.target within 90s.
        # Catches service-ordering bugs, D-Bus startup issues, broken user/shell
        # setup, and similar dynamic failures the chroot tests can't see.
        #
        # Limits: nspawn shares the host kernel, so kernel modules (snd-aloop,
        # dtoverlays) + hardware (I2C, GPIO, WM8731 audio, the wlan0/uap0 AP)
        # are not exercised. uap0.service/hostapd/dnsmasq self-skip or fail
        # harmlessly here (no wlan0); that does not block multi-user.target.
        id: nspawn
        continue-on-error: true
        run: |
          set -eux
          # systemd-container is installed up front with the other host deps.
          ROOTFS=$(ls -d vendor/pi-gen/work/*/stage-zbitx/rootfs 2>/dev/null | head -1)
          if [ -z "$ROOTFS" ] || [ ! -d "$ROOTFS" ]; then
            echo "FAIL: no stage-zbitx rootfs found under vendor/pi-gen/work" >&2
            exit 1
          fi

          # pi-gen's /etc/fstab declares PARTUUID block mounts (/boot/firmware
          # vfat, / ext4) that cannot mount inside a container — boot-firmware.mount
          # fails, local-fs.target fails, and systemd drops to emergency mode
          # (root is locked, so it just hangs). Those mounts are hardware-only;
          # the deliverable image is already packaged, and this leftover rootfs is
          # throwaway, so neutralise fstab for the boot test (keep proc).
          sudo cp -a "$ROOTFS/etc/fstab" "$ROOTFS/etc/fstab.nspawn-bak" 2>/dev/null || true
          printf 'proc /proc proc defaults 0 0\n' | sudo tee "$ROOTFS/etc/fstab" >/dev/null

          echo "Booting $ROOTFS via systemd-nspawn..."

          sudo timeout --kill-after=10 120 systemd-nspawn \
            -D "$ROOTFS" \
            --boot \
            --quiet \
            --machine=zbitx-test \
            --resolv-conf=off \
            --kill-signal=SIGRTMIN+3 \
            2>&1 | tee nspawn.log &
          NSPAWN_BG=$!

          DEADLINE=$(( $(date +%s) + 90 ))
          REACHED=0
          ansi_strip() { sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' "$1"; }
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if [ -f nspawn.log ] && ansi_strip nspawn.log | grep -qE "Reached target multi-user|Multi-User System"; then
              REACHED=1
              break
            fi
            sleep 2
          done

          sudo machinectl poweroff zbitx-test 2>/dev/null || true
          for i in 1 2 3 4 5; do
            kill -0 "$NSPAWN_BG" 2>/dev/null || break
            sleep 1
          done
          sudo pkill -SIGRTMIN+3 -f "systemd-nspawn.*zbitx-test" 2>/dev/null || true
          wait "$NSPAWN_BG" 2>/dev/null || true

          if [ "$REACHED" -eq 1 ]; then
            echo "OK: rootfs reached multi-user.target in systemd-nspawn"
          else
            echo "FAIL: rootfs did not reach multi-user.target within 90s" >&2
            echo "--- nspawn.log (last 80 lines) ---" >&2
            tail -n 80 nspawn.log >&2 || true
            exit 1
          fi

      - name: Upload nspawn boot log (always)
        if: always() && hashFiles('nspawn.log') != ''
        uses: actions/upload-artifact@v7
        with:
          name: nspawn-log
          path: nspawn.log
          if-no-files-found: warn
          retention-days: 14

      - name: Append nspawn log tail to step summary (always)
        if: always() && hashFiles('nspawn.log') != ''
        run: |
          {
            echo
            echo "## systemd-nspawn boot log tail"
            echo
            echo '```'
            tail -n 80 nspawn.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if nspawn boot test failed
        if: steps.nspawn.outcome == 'failure'
        run: |
          echo "systemd-nspawn boot test failed; see step summary + nspawn-log artifact."
          exit 1

      - name: Stage flashable artifact
        # Only release runs (main / tags) keep the image; PR / branch / dispatch
        # runs build + boot-test it to prove the pipeline, then throw it away
        # (and skip xz above). Same gate on the two upload steps below.
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        # Flatten the deploy dir so the .img.xz sits at the top of the artifact.
        run: |
          mkdir -p _artifact
          cp vendor/pi-gen/deploy/*-zbitx-bookworm.img.xz _artifact/

      - name: Upload image artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        # pi-gen writes deploy/<date>-zbitx-bookworm.img.xz — the file Raspberry
        # Pi Imager flashes (it handles .xz natively).
        #
        # archive: false uploads it as a BARE file with no zip wrapper (GitHub
        # Actions gained this 2026-02-26; needs upload-artifact v7 +
        # download-artifact v8). So the download is the raw .img.xz, not a .zip
        # you must unpack first. Caveats of archive: false: it accepts exactly
        # one file (we emit exactly one image), and it IGNORES `name:` — the
        # artifact is named after the file, e.g. 2026-06-06-zbitx-bookworm.img.xz.
        uses: actions/upload-artifact@v7
        with:
          path: _artifact/*-zbitx-bookworm.img.xz
          archive: false
          if-no-files-found: warn
          retention-days: 14

      - name: Upload SBOM artifact
        # Tied to the image: only kept on release runs (main / tags).
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        # pi-gen deploys the SPDX SBOM (xz-compressed) when syft is present.
        # The .info package manifest stays under work/export-image/.
        uses: actions/upload-artifact@v7
        with:
          name: zbitx-${{ matrix.release }}-${{ matrix.arch }}-sbom
          path: |
            vendor/pi-gen/deploy/*.sbom*
            vendor/pi-gen/work/*/export-image/*.info
          if-no-files-found: warn
          retention-days: 90
          # *.sbom* is xz-compressed; store rather than re-DEFLATE it. The .info
          # is tiny text, so the level barely matters either way.
          compression-level: 0
