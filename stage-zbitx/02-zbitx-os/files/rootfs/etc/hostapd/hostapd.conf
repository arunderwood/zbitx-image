# WiFi access point on the virtual uap0 interface (see uap0.service).
# Derived from setup-ap.sh.
interface=uap0
driver=nl80211
ssid=zbitx
hw_mode=g
# channel=0 lets hostapd auto-follow whatever channel the STA side is
# tuned to. The Pi Zero 2 W's brcmfmac driver supports AP+STA mode on
# the same radio, but the radio can only be on one channel at a time —
# so the AP has to follow the STA. Hard-coding a channel here would
# break the AP whenever the user connects to a STA network on a
# different channel.
channel=0
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=zbitx12345
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
