# WiFi access point on the virtual uap0 interface (see uap0.service).
# Derived from setup-ap.sh.
interface=uap0
driver=nl80211
ssid=zbitx
hw_mode=g
# AP+STA on the Pi's single brcmfmac radio must share one channel, so the AP
# has to sit on whatever channel wlan0 (the STA) is using. This is NOT done
# with channel=0: on brcmfmac channel=0 means ACS (auto channel select), which
# the driver can't do (no survey-dump support) — hostapd then fails to start
# the BSS. Instead, zbitx-ap-channel (ExecStartPre on hostapd.service) rewrites
# the line below to the live wlan0 channel at AP start, exactly like the
# upstream setup-ap.sh does. The value here is just the fallback when wlan0
# isn't associated yet.
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=zbitx12345
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
