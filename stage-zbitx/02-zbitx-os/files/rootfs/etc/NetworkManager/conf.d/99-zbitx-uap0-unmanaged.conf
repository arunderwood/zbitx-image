# zbitx hybrid WiFi: NetworkManager owns the wlan0 *client* connection (so
# Raspberry Pi Imager's "Edit settings" WiFi provisioning works out of the
# box), while the zbitx access point runs as hostapd + dnsmasq on a virtual
# uap0 interface created by uap0.service.
#
# Mark uap0 unmanaged so NetworkManager keeps its hands off the AP interface
# (otherwise NM races hostapd for it and the AP fails to come up). wlan0
# stays managed by NM for the upstream/client link.
#
# Concurrent AP+STA on the Pi's single onboard radio is an unsupported,
# same-channel mode (hostapd.conf uses channel=0 to follow the client) — see
# docs/architecture.md "WiFi: hybrid NetworkManager + hostapd AP".
[keyfile]
unmanaged-devices=interface-name:uap0
