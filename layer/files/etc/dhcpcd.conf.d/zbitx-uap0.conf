# dhcpcd snippet — declare uap0 as a static interface so dhcpcd doesn't
# fight with hostapd/dnsmasq over the virtual AP interface.
# Loaded if dhcpcd has an /etc/dhcpcd.conf.d/ drop-in directory; otherwise
# the snippet needs to be appended to /etc/dhcpcd.conf by os-config.sh.
interface uap0
static ip_address=192.168.4.1/24
nohook wpa_supplicant
