# METABEGIN
# X-Env-Layer-Name: zbitx-sbitx
# X-Env-Layer-Category: app
# X-Env-Layer-Desc: zbitxv2 amateur radio SDR transceiver software for the
#  zBitx v2 hardware (Pi Zero 2 W + sBitx radio board). Installs build
#  toolchain, WiringPi 3.x, FFTW3, compiles the radio app, and configures
#  audio, WiFi AP, and firstboot.
# X-Env-Layer-Version: 0.1.0
# X-Env-Layer-Requires: debian-bookworm-arm64-multi,
#  rpi-debian-bookworm,
#  rpi-misc-utils,
#  rpi-misc-skel,
#  rpi-user-credentials,
#  systemd-net-min,
#  systemd-timesyncd,
#  fake-hwclock
#
# X-Env-VarPrefix: sbitx
#
# X-Env-Var-srcdir: ${SRCROOT}/vendor/sbitx
# X-Env-Var-srcdir-Desc: Path to the zbitxv2 source tree (vendored as a submodule
#  at <project>/vendor/sbitx; ${SRCROOT} is set by rpi-image-gen to -S's arg).
# X-Env-Var-srcdir-Required: n
# X-Env-Var-srcdir-Valid: string
# X-Env-Var-srcdir-Set: y
#
# X-Env-Var-assetdir: ${DIRECTORY}
# X-Env-Var-assetdir-Desc: Directory for layer assets (file overlays, scripts).
# X-Env-Var-assetdir-Required: n
# X-Env-Var-assetdir-Valid: string
# X-Env-Var-assetdir-Set: y
#
# X-Env-Var-wiringpi_url: https://github.com/WiringPi/WiringPi/releases/download/3.18/wiringpi_3.18_arm64.deb
# X-Env-Var-wiringpi_url-Desc: WiringPi 3.x .deb download URL (replaces deprecated drogon.net 2.x).
# X-Env-Var-wiringpi_url-Required: n
# X-Env-Var-wiringpi_url-Valid: string
# X-Env-Var-wiringpi_url-Set: y
#
# X-Env-Var-wiringpi_sha256: 95553cde829a976f9a546d59c673e4292eab62869c0c0cd4427f1e78a1aad6c6
# X-Env-Var-wiringpi_sha256-Desc: SHA256 of the WiringPi 3.18 arm64 .deb, computed locally on 2026-05-23.
# X-Env-Var-wiringpi_sha256-Required: n
# X-Env-Var-wiringpi_sha256-Valid: string
# X-Env-Var-wiringpi_sha256-Set: y
#
# X-Env-Var-fftw_url: https://www.fftw.org/fftw-3.3.10.tar.gz
# X-Env-Var-fftw_url-Desc: FFTW3 source tarball.
# X-Env-Var-fftw_url-Required: n
# X-Env-Var-fftw_url-Valid: string
# X-Env-Var-fftw_url-Set: y
#
# X-Env-Var-fftw_sha256: 56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467
# X-Env-Var-fftw_sha256-Desc: SHA256 of fftw-3.3.10.tar.gz (from fftw.org).
# X-Env-Var-fftw_sha256-Required: n
# X-Env-Var-fftw_sha256-Valid: string
# X-Env-Var-fftw_sha256-Set: y
# METAEND
---
mmdebstrap:
  packages:
    # Build toolchain
    - build-essential
    - pkg-config
    - git
    - ca-certificates
    - wget

    # zbitxv2 build deps (from install.txt + CLAUDE.md, minus deprecated `ntp`)
    - libncurses-dev
    - libasound2-dev
    - libgtk-3-dev
    - libsqlite3-dev
    - sqlite3

    # WiFi AP stack (from setup-ap.sh)
    - hostapd
    - dnsmasq
    - dhcpcd5
    - iptables
    - iptables-persistent

    # Stock Raspberry Pi OS Desktop stack (this is the meta-package that
    # turns RPi OS Lite into the Desktop edition — lightdm, the labwc or
    # wayfire compositor, pcmanfm, lxterminal, Pixel theme, raspi-config
    # via dependency chain). Picking this over a hand-rolled openbox
    # kiosk means lightdm handles autologin natively, and users get the
    # familiar Pi tooling (raspi-config, file manager, etc.).
    - raspberrypi-ui-mods
    - raspi-config

  customize-hooks:
    # ---- WiringPi 3.x install (Bookworm-port patch #1) ----
    - |-
      set -eux
      curl -fsSL -o "$1/tmp/wiringpi.deb" "$IGconf_sbitx_wiringpi_url"
      if [ "$IGconf_sbitx_wiringpi_sha256" != "UNVERIFIED_PLACEHOLDER_REPLACE_BEFORE_FIRST_BUILD" ]; then
        echo "$IGconf_sbitx_wiringpi_sha256  $1/tmp/wiringpi.deb" | sha256sum -c -
      else
        echo "WARNING: wiringpi_sha256 is a placeholder. Compute the real SHA256 of $IGconf_sbitx_wiringpi_url and update layer/zbitx-sbitx.yaml before trusting this image."
      fi
      chroot "$1" sh -c "apt-get install -y /tmp/wiringpi.deb && rm /tmp/wiringpi.deb"

    # ---- FFTW3 from source (double + single precision) ----
    - |-
      set -eux
      install -m 0755 "${IGconf_sbitx_assetdir}/scripts/build-fftw.sh" "$1/tmp/build-fftw.sh"
      chroot "$1" /tmp/build-fftw.sh "$IGconf_sbitx_fftw_url" "$IGconf_sbitx_fftw_sha256"
      rm "$1/tmp/build-fftw.sh"

    # ---- zbitxv2 source → /home/pi/sbitx + build ----
    - |-
      set -eux
      # Copy source into chroot at /home/pi/sbitx (matches hardcoded paths
      # in sbitx.c:66 and fft_filter.c:21).
      mkdir -p "$1/home/pi"
      cp -a "$IGconf_sbitx_srcdir" "$1/home/pi/sbitx"
      install -m 0755 "${IGconf_sbitx_assetdir}/scripts/build-sbitx.sh" "$1/tmp/build-sbitx.sh"
      chroot "$1" /tmp/build-sbitx.sh
      rm "$1/tmp/build-sbitx.sh"
      # Hand the tree to the pi user (created by rpi-user-credentials).
      chroot "$1" chown -R pi:pi /home/pi/sbitx

    # ---- Boot + OS configuration ----
    # Order: lay down file overlays FIRST so os-config.sh and systemctl
    # have the files to work with. Then run os-config.sh for the
    # imperative bits (config.txt append, group memberships, perms).
    # Then enable services that depend on the unit files just installed.
    - |-
      set -eux
      OVERLAY_TGZ="$1/tmp/zbitx-overlay.tgz"
      tar -C "${IGconf_sbitx_assetdir}/files" -czf "$OVERLAY_TGZ" .
      tar -C "$1" -xzf "$OVERLAY_TGZ"
      rm "$OVERLAY_TGZ"
      install -m 0755 "${IGconf_sbitx_assetdir}/scripts/os-config.sh" "$1/tmp/os-config.sh"
      chroot "$1" /tmp/os-config.sh
      rm "$1/tmp/os-config.sh"
      chroot "$1" systemctl enable hostapd dnsmasq uap0.service
      chroot "$1" systemctl disable NetworkManager 2>/dev/null || true

    # ---- In-chroot smoke tests (Phase 1 CI gate) ----
    - |-
      set -eux
      TEST_TGZ="$1/tmp/zbitx-tests.tgz"
      tar -C "${IGconf_sbitx_assetdir}/../tests/chroot" -czf "$TEST_TGZ" .
      mkdir -p "$1/tmp/sbitx-tests"
      tar -C "$1/tmp/sbitx-tests" -xzf "$TEST_TGZ"
      chmod +x "$1"/tmp/sbitx-tests/*.sh
      chroot "$1" sh -c "for t in /tmp/sbitx-tests/*.sh; do echo '== '\"\$t\"' =='; \"\$t\" || exit 1; done"
      rm -rf "$1/tmp/sbitx-tests" "$TEST_TGZ"

  cleanup-hooks:
    - |-
      set -eux
      # Trim apt caches; rpi-image-gen normally handles this but be explicit.
      chroot "$1" apt-get clean
      rm -rf "$1/var/lib/apt/lists/"*

      # Wipe baked-in SSH host keys. With the keys absent, sshd's first
      # start on real hardware regenerates fresh per-device keys. Shipping
      # identical baked keys across every flashed image is a security
      # smell (passive MITM attacks against any zbitx).
      rm -f "$1/etc/ssh/ssh_host_"*_key "$1/etc/ssh/ssh_host_"*_key.pub

      # Empty /etc/machine-id. systemd-machine-id-setup regenerates it
      # on first boot to a unique value. Shipping a fixed machine-id
      # across every image breaks anything that uses it as an identifier
      # (DHCP DUID, systemd journals, etc.).
      : > "$1/etc/machine-id"
      rm -f "$1/var/lib/dbus/machine-id"
